<VirtualHost *:__HTTP_PORT__>
    ServerName smcr_cloud_ha
    DocumentRoot /var/www/html
    Timeout 300
    RequestReadTimeout header=0 body=0

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    php_value session.save_path /data/php_sessions

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>

<VirtualHost *:__HTTPS_PORT__>
    ServerName smcr_cloud_ha
    DocumentRoot /var/www/html
    Timeout 300
    RequestReadTimeout header=0 body=0

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/smcr.crt
    SSLCertificateKeyFile /etc/apache2/ssl/smcr.key

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    php_value session.save_path /data/php_sessions

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
